<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VehicleTrack Pro — Paddy Procurement Logistics</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --md-primary:#1a73e8;--md-primary-dark:#1557b0;--md-primary-light:#d2e3fc;
  --md-secondary:#185abc;--md-error:#d93025;--md-success:#1e8e3e;--md-warning:#e37400;
  --md-surface:#fff;--md-bg:#f0f4f9;--md-card:#fff;
  --md-on-primary:#fff;--md-on-surface:#202124;--md-on-surface-variant:#5f6368;
  --md-outline:#dadce0;--md-outline-variant:#e8eaed;
  --md-elev1:0 1px 2px rgba(60,64,67,.3),0 1px 3px 1px rgba(60,64,67,.15);
  --md-elev2:0 1px 2px rgba(60,64,67,.3),0 2px 6px 2px rgba(60,64,67,.15);
  --md-elev3:0 4px 8px 3px rgba(60,64,67,.15),0 1px 3px rgba(60,64,67,.3);
  --nav-w:256px;--topbar-h:64px;
  --ff:'Roboto',sans-serif;--fm:'Roboto Mono',monospace;
  --r4:4px;--r8:8px;--r12:12px;--r16:16px;--r24:24px;--r50:50px;
}
html,body{height:100%;font-family:var(--ff);background:var(--md-bg);color:var(--md-on-surface);font-size:14px;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:#dadce0;border-radius:3px}
input,select,textarea,button{font-family:var(--ff)}

/* ── MATERIAL ICONS ── */
.mi{font-family:'Material Icons Round';font-style:normal;font-size:20px;line-height:1;display:inline-flex;align-items:center;justify-content:center;vertical-align:middle;user-select:none}
.mi.sm{font-size:16px}.mi.lg{font-size:24px}.mi.xl{font-size:32px}

/* ── TYPOGRAPHY ── */
.t-headline{font-size:24px;font-weight:400;letter-spacing:0;line-height:32px}
.t-title{font-size:16px;font-weight:500;letter-spacing:.15px;line-height:24px}
.t-body{font-size:14px;font-weight:400;letter-spacing:.25px;line-height:20px}
.t-label{font-size:12px;font-weight:500;letter-spacing:.1px;line-height:16px}
.t-caption{font-size:11px;font-weight:400;letter-spacing:.4px;line-height:16px;color:var(--md-on-surface-variant)}

/* ── LAYOUT ── */
#login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#e8f0fe 0%,#f0f4f9 50%,#e6f4ea 100%);padding:24px}
#app-wrap{display:flex;height:100vh;overflow:hidden}
.nav-drawer{width:var(--nav-w);height:100%;background:var(--md-bg);border-right:1px solid var(--md-outline-variant);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;transition:width .25s cubic-bezier(.4,0,.2,1)}
.nav-drawer.collapsed{width:72px}
.nav-logo{padding:16px 16px 8px;display:flex;align-items:center;gap:12px;min-height:64px}
.nav-logo-icon{width:40px;height:40px;border-radius:var(--r8);background:var(--md-primary);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.nav-logo-icon .mi{color:white;font-size:22px}
.nav-logo-text{font-size:16px;font-weight:700;color:var(--md-primary);white-space:nowrap;overflow:hidden}
.nav-drawer.collapsed .nav-logo-text{display:none}
.nav-section-label{padding:12px 16px 4px;font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--md-on-surface-variant);white-space:nowrap;overflow:hidden}
.nav-drawer.collapsed .nav-section-label{padding:12px 0 4px;text-align:center;font-size:9px}
.nav-item{display:flex;align-items:center;gap:12px;padding:0 16px;height:48px;border-radius:var(--r50);margin:2px 8px;cursor:pointer;transition:background .15s;position:relative;color:var(--md-on-surface-variant);overflow:hidden;white-space:nowrap;user-select:none}
.nav-item:hover{background:rgba(26,115,232,.08)}
.nav-item.active{background:var(--md-primary-light);color:var(--md-primary);font-weight:500}
.nav-item .ni-icon{flex-shrink:0;width:24px;text-align:center}
.nav-item .ni-label{font-size:14px;font-weight:inherit;overflow:hidden;text-overflow:ellipsis;flex:1}
.nav-drawer.collapsed .ni-label{display:none}
.nav-badge{background:var(--md-error);color:white;font-size:11px;font-weight:600;padding:1px 6px;border-radius:var(--r50);line-height:16px;flex-shrink:0}
.nav-drawer.collapsed .nav-badge{position:absolute;top:6px;right:6px;min-width:16px;padding:1px 4px;font-size:9px}
.nav-footer{margin-top:auto;padding:12px 8px;border-top:1px solid var(--md-outline-variant)}
.nav-user{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--r8);cursor:default}
.nav-avatar{width:36px;height:36px;border-radius:50%;background:var(--md-primary-light);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px;color:var(--md-primary);flex-shrink:0}
.nav-user-info{overflow:hidden}
.nav-user-name{font-size:13px;font-weight:500;color:var(--md-on-surface);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-user-role{font-size:11px;color:var(--md-on-surface-variant)}
.nav-drawer.collapsed .nav-user-info{display:none}
.nav-toggle{display:flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:50%;cursor:pointer;margin:4px auto;color:var(--md-on-surface-variant);transition:background .15s;border:none;background:transparent}
.nav-toggle:hover{background:rgba(0,0,0,.06)}

/* ── CONTENT AREA ── */
.content-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:var(--topbar-h);background:var(--md-surface);border-bottom:1px solid var(--md-outline-variant);padding:0 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-shrink:0;box-shadow:var(--md-elev1)}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-title{font-size:20px;font-weight:500;color:var(--md-on-surface)}
.topbar-right{display:flex;align-items:center;gap:8px}
.tb-chip{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:var(--r50);background:var(--md-primary-light);color:var(--md-primary);font-size:12px;font-weight:500}
.tb-icon-btn{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--md-on-surface-variant);border:none;background:transparent;transition:background .15s;position:relative}
.tb-icon-btn:hover{background:rgba(0,0,0,.06)}
.tb-badge-dot{position:absolute;top:8px;right:8px;width:8px;height:8px;background:var(--md-error);border-radius:50%;border:2px solid var(--md-surface)}
.fb-status{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:var(--r50);font-size:11px;font-weight:500;border:1px solid var(--md-outline)}
.fb-status.online{color:var(--md-success);border-color:#a8d5b5}
.fb-status.offline{color:var(--md-on-surface-variant);border-color:var(--md-outline)}
.fb-dot{width:7px;height:7px;border-radius:50%}
.fb-status.online .fb-dot{background:var(--md-success)}
.fb-status.offline .fb-dot{background:#9aa0a6}
.page-scroll{flex:1;overflow-y:auto;padding:24px}

/* ── CARDS ── */
.md-card{background:var(--md-card);border-radius:var(--r12);box-shadow:var(--md-elev1);overflow:hidden}
.md-card.flat{box-shadow:none;border:1px solid var(--md-outline-variant)}
.card-header{padding:16px 20px;border-bottom:1px solid var(--md-outline-variant);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.card-title{font-size:15px;font-weight:500;color:var(--md-on-surface);display:flex;align-items:center;gap:8px}
.card-body{padding:16px 20px}
.card-body.np{padding:0}

/* ── KPI CARDS ── */
.kpi-grid{display:grid;gap:16px;margin-bottom:24px}
.kpi-grid.g4{grid-template-columns:repeat(4,1fr)}
.kpi-grid.g3{grid-template-columns:repeat(3,1fr)}
.kpi-grid.g2{grid-template-columns:repeat(2,1fr)}
@media(max-width:1100px){.kpi-grid.g4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.kpi-grid.g4,.kpi-grid.g3{grid-template-columns:1fr 1fr}}
.kpi-card{background:var(--md-card);border-radius:var(--r12);padding:20px;box-shadow:var(--md-elev1);position:relative;overflow:hidden;cursor:default}
.kpi-card .kpi-accent{position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:var(--r4) 0 0 var(--r4)}
.kpi-card .kpi-icon{width:48px;height:48px;border-radius:var(--r12);display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.kpi-card .kpi-label{font-size:12px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--md-on-surface-variant);margin-bottom:6px}
.kpi-card .kpi-val{font-family:var(--fm);font-size:28px;font-weight:500;line-height:1;margin-bottom:4px}
.kpi-card .kpi-sub{font-size:12px;color:var(--md-on-surface-variant)}
.kpi-blue .kpi-accent{background:#1a73e8}.kpi-blue .kpi-icon{background:#e8f0fe}.kpi-blue .kpi-val{color:#1a73e8}.kpi-blue .kpi-icon .mi{color:#1a73e8}
.kpi-green .kpi-accent{background:#1e8e3e}.kpi-green .kpi-icon{background:#e6f4ea}.kpi-green .kpi-val{color:#1e8e3e}.kpi-green .kpi-icon .mi{color:#1e8e3e}
.kpi-amber .kpi-accent{background:#e37400}.kpi-amber .kpi-icon{background:#fef0cd}.kpi-amber .kpi-val{color:#e37400}.kpi-amber .kpi-icon .mi{color:#e37400}
.kpi-red .kpi-accent{background:#d93025}.kpi-red .kpi-icon{background:#fce8e6}.kpi-red .kpi-val{color:#d93025}.kpi-red .kpi-icon .mi{color:#d93025}
.kpi-purple .kpi-accent{background:#7b1fa2}.kpi-purple .kpi-icon{background:#f3e5f5}.kpi-purple .kpi-val{color:#7b1fa2}.kpi-purple .kpi-icon .mi{color:#7b1fa2}
.kpi-teal .kpi-accent{background:#0097a7}.kpi-teal .kpi-icon{background:#e0f7fa}.kpi-teal .kpi-val{color:#0097a7}.kpi-teal .kpi-icon .mi{color:#0097a7}

/* ── GRID LAYOUTS ── */
.g2c{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.g65{display:grid;grid-template-columns:3fr 2fr;gap:20px;margin-bottom:20px}
.g35{display:grid;grid-template-columns:2fr 3fr;gap:20px;margin-bottom:20px}
@media(max-width:960px){.g2c,.g65,.g35{grid-template-columns:1fr}}

/* ── BUTTONS ── */
.md-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:0 24px;height:40px;border-radius:var(--r50);font-size:14px;font-weight:500;font-family:var(--ff);cursor:pointer;border:none;transition:all .2s;letter-spacing:.025em;white-space:nowrap}
.md-btn-filled{background:var(--md-primary);color:white;box-shadow:var(--md-elev1)}
.md-btn-filled:hover{background:var(--md-primary-dark);box-shadow:var(--md-elev2)}
.md-btn-filled.green{background:#1e8e3e}.md-btn-filled.green:hover{background:#137333}
.md-btn-filled.red{background:var(--md-error)}.md-btn-filled.red:hover{background:#b31412}
.md-btn-filled.amber{background:#e37400}.md-btn-filled.amber:hover{background:#b45e00}
.md-btn-filled.purple{background:#7b1fa2}.md-btn-filled.purple:hover{background:#6a1b9a}
.md-btn-outlined{background:transparent;color:var(--md-primary);border:1px solid var(--md-outline)}
.md-btn-outlined:hover{background:rgba(26,115,232,.08)}
.md-btn-text{background:transparent;color:var(--md-primary);padding:0 12px}
.md-btn-text:hover{background:rgba(26,115,232,.08)}
.md-btn.sm{height:32px;padding:0 16px;font-size:13px}
.md-btn.xs{height:28px;padding:0 12px;font-size:12px}
.md-btn:disabled{opacity:.4;cursor:not-allowed;pointer-events:none}

/* ── FORMS ── */
.fgrp{margin-bottom:16px}
.fgrp label{display:block;font-size:12px;font-weight:500;color:var(--md-on-surface-variant);margin-bottom:6px;letter-spacing:.04em}
.md-input,.md-select,.md-textarea{width:100%;padding:10px 14px;border:1px solid var(--md-outline);border-radius:var(--r4);font-size:14px;font-family:var(--ff);color:var(--md-on-surface);background:var(--md-surface);outline:none;transition:border-color .15s,box-shadow .15s;-webkit-appearance:none}
.md-input:focus,.md-select:focus,.md-textarea:focus{border-color:var(--md-primary);box-shadow:0 0 0 2px rgba(26,115,232,.2)}
.md-input::placeholder{color:#9aa0a6}
.md-textarea{resize:vertical;min-height:72px;line-height:1.5}
.fgrid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.fgrid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
@media(max-width:560px){.fgrid2,.fgrid3{grid-template-columns:1fr}}
.ferr{font-size:12px;color:var(--md-error);margin-top:4px;display:flex;align-items:center;gap:4px}
input[type=file]{display:none}
.required{color:var(--md-error)}

/* ── CHIPS / STATUS PILLS ── */
.chip{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:var(--r50);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
.chip::before{content:'';width:6px;height:6px;border-radius:50%;flex-shrink:0}
.chip-dispatched{background:#fef0cd;color:#b35900}.chip-dispatched::before{background:#e37400}
.chip-dpc{background:#e8f0fe;color:#185abc}.chip-dpc::before{background:#1a73e8}
.chip-dpc-dispatch{background:#f3e5f5;color:#6a1b9a}.chip-dpc-dispatch::before{background:#7b1fa2}
.chip-godown{background:#e6f4ea;color:#137333}.chip-godown::before{background:#1e8e3e}
.chip-delayed{background:#fce8e6;color:#b31412;animation:blink 2s infinite}.chip-delayed::before{background:#d93025}
.chip-active{background:#e6f4ea;color:#137333}.chip-active::before{background:#1e8e3e}
.chip-inactive{background:#f1f3f4;color:#5f6368}.chip-inactive::before{background:#9aa0a6}
.chip-admin{background:#e8eaf6;color:#283593}.chip-admin::before{background:#3949ab}
.chip-entry{background:#e0f2f1;color:#00695c}.chip-entry::before{background:#00897b}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.6}}

/* ── TABLES ── */
.tw{overflow-x:auto}
.md-table{width:100%;border-collapse:collapse;font-size:13px}
.md-table thead th{padding:12px 16px;text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--md-on-surface-variant);border-bottom:2px solid var(--md-outline-variant);white-space:nowrap;background:var(--md-bg)}
.md-table tbody td{padding:12px 16px;border-bottom:1px solid var(--md-outline-variant);vertical-align:middle;color:var(--md-on-surface)}
.md-table tbody tr:last-child td{border-bottom:none}
.md-table tbody tr:hover td{background:rgba(26,115,232,.04)}
.md-table .vnum-cell{font-family:var(--fm);font-size:13px;font-weight:500;color:var(--md-primary)}
.md-table .action-cell{white-space:nowrap;text-align:right}

/* ── VEHICLE CARD ── */
.v-list{display:flex;flex-direction:column;gap:12px}
.v-card{background:var(--md-card);border-radius:var(--r12);border:1px solid var(--md-outline-variant);padding:16px;transition:box-shadow .2s,border-color .2s}
.v-card:hover{box-shadow:var(--md-elev2);border-color:var(--md-primary-light)}
.v-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:10px}
.v-num{font-family:var(--fm);font-size:17px;font-weight:600;color:var(--md-primary);letter-spacing:.04em}
.v-meta{display:flex;flex-wrap:wrap;gap:6px 20px;margin-bottom:10px}
.vm-item{font-size:12px;color:var(--md-on-surface-variant)}
.vm-item b{color:var(--md-on-surface);font-weight:500}
.v-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid var(--md-outline-variant)}
.v-confirm-tag{font-size:12px;color:var(--md-success);display:flex;align-items:center;gap:4px;font-weight:500}

/* ── TIMELINE ── */
.tl-row{display:flex;align-items:center;margin-bottom:4px}
.tl-step{display:flex;align-items:center;gap:4px}
.tl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.tl-dot.done{background:var(--md-success)}
.tl-dot.cur{background:var(--md-primary);box-shadow:0 0 0 3px rgba(26,115,232,.25)}
.tl-dot.pend{background:transparent;border:2px solid var(--md-outline)}
.tl-lbl{font-size:11px;font-weight:500}
.tl-lbl.done{color:var(--md-success)}.tl-lbl.cur{color:var(--md-primary)}.tl-lbl.pend{color:var(--md-outline)}
.tl-line{flex:1;height:1px;background:var(--md-outline-variant);margin:0 8px;max-width:32px}

/* ── LOGIN ── */
.login-card{background:var(--md-card);border-radius:var(--r16);box-shadow:var(--md-elev3);padding:40px;width:100%;max-width:440px}
.login-brand{text-align:center;margin-bottom:32px}
.login-brand .brand-logo{width:72px;height:72px;background:var(--md-primary);border-radius:var(--r16);display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.login-brand .brand-logo .mi{color:white;font-size:36px}
.login-brand h1{font-size:24px;font-weight:400;color:var(--md-on-surface)}
.login-brand p{font-size:14px;color:var(--md-on-surface-variant);margin-top:4px}
.role-tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:24px}
.role-tab{padding:12px 6px;text-align:center;border-radius:var(--r8);border:2px solid var(--md-outline-variant);cursor:pointer;transition:all .2s;background:transparent;font-family:var(--ff)}
.role-tab:hover{border-color:var(--md-primary-light);background:var(--md-primary-light)}
.role-tab.active{border-color:var(--md-primary);background:var(--md-primary-light)}
.rt-icon{font-size:24px;display:block;margin-bottom:4px}
.rt-name{font-size:11px;font-weight:600;color:var(--md-on-surface-variant);text-transform:uppercase;letter-spacing:.06em}
.role-tab.active .rt-name{color:var(--md-primary)}
.demo-hint{text-align:center;font-size:12px;color:var(--md-on-surface-variant);margin-top:16px;line-height:1.8;background:var(--md-bg);border-radius:var(--r8);padding:10px}
.demo-hint b{color:var(--md-on-surface)}
.demo-hint span{color:var(--md-primary);font-weight:500}

/* ── MODALS ── */
.md-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(2px)}
.md-modal{background:var(--md-card);border-radius:var(--r16);width:100%;max-width:560px;max-height:92vh;overflow-y:auto;box-shadow:var(--md-elev3);animation:modalIn .2s ease}
@keyframes modalIn{from{opacity:0;transform:translateY(16px)scale(.97)}to{opacity:1;transform:none}}
.md-modal.wide{max-width:720px}
.modal-head{padding:20px 24px 16px;position:sticky;top:0;background:var(--md-card);z-index:1;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--md-outline-variant)}
.modal-title{font-size:18px;font-weight:500;color:var(--md-on-surface)}
.modal-close-btn{width:36px;height:36px;border-radius:50%;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--md-on-surface-variant);transition:background .15s}
.modal-close-btn:hover{background:rgba(0,0,0,.06)}
.modal-body{padding:20px 24px}
.modal-foot{padding:16px 24px;border-top:1px solid var(--md-outline-variant);display:flex;gap:8px;justify-content:flex-end;position:sticky;bottom:0;background:var(--md-card)}
.v-hero{background:var(--md-bg);border-radius:var(--r8);padding:14px 16px;margin-bottom:16px;border-left:4px solid var(--md-primary)}
.v-hero-num{font-family:var(--fm);font-size:20px;font-weight:600;color:var(--md-primary)}
.v-hero-sub{font-size:12px;color:var(--md-on-surface-variant);margin-top:3px}

<script>
'use strict';
// ═══════════════════════════════════════════════════════════
// FIREBASE CONFIG — replace with your project credentials
// ═══════════════════════════════════════════════════════════
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyCEGeR2FGJ78mMSltPEHouuLYCo2PgMvug",
  authDomain:        "vehicle-tracking-eb4aa.firebaseapp.com",
  projectId:         "vehicle-tracking-eb4aa",
  storageBucket:     "vehicle-tracking-eb4aa.firebasestorage.app",
  messagingSenderId: "219147510451",
  appId:             "1:219147510451:web:7382307d3022a4fcc246c6",
  measurementId:     "G-XLSPNES1HC"
};
// Photos are stored in localStorage only (not synced to Firestore due to size limits).
// For photo cloud sync, enable Firebase Storage separately.

// ═══════════════════════════════════════════════════════════
// DATABASE LAYER  (Firestore + localStorage)
// ═══════════════════════════════════════════════════════════
const DB = {
  _db: null, _online: false, _subs: [], _changeCallbacks: {},

  async init() {
    const configured = !Object.values(FIREBASE_CONFIG).some(v => v.startsWith('REPLACE'));
    if (configured) {
      try {
        firebase.initializeApp(FIREBASE_CONFIG);
        this._db = firebase.firestore();
        this._db.enablePersistence({ synchronizeTabs: true }).catch(() => {});
        // Use a lightweight read for ping — less likely to be blocked by Firestore rules
        await Promise.race([
          this._db.collection('_ping').doc('ping').get(),
          new Promise((_, rej) => setTimeout(() => rej(new Error('timeout after 5s')), 5000))
        ]);
        this._online = true;
        this._updateStatusUI(true);
        snack('Firebase connected — real-time sync active', 'ok');
      } catch(e) {
        this._initError = e.message || String(e);
        console.warn('Firebase unavailable:', this._initError);
        this._updateStatusUI(false);
      }
    }
    return this._online;
  },

  _updateStatusUI(online) {
    const el = document.getElementById('fb-status-chip');
    const txt = document.getElementById('fb-status-text');
    if (!el) return;
    el.className = 'fb-status ' + (online ? 'online' : 'offline');
    txt.textContent = online ? 'Firebase Live' : 'Local';
  },

  // ── localStorage helpers ──────────────────────────────────────────────
  _lget(k) {
    try { return JSON.parse(localStorage.getItem('vtp4_' + k) || '[]'); } catch(e) { return []; }
  },
  _lset(k, d) {
    try {
      localStorage.setItem('vtp4_' + k, JSON.stringify(d));
    } catch(e) {
      if (e.name === 'QuotaExceededError') {
        // Free space by evicting vehicle photos, then retry
        try {
          const PHOTO_FIELDS = ['dpcPhoto','godownPhoto','dpcDispatchPhoto'];
          const vs = JSON.parse(localStorage.getItem('vtp4_vehicles') || '[]');
          vs.forEach(v => PHOTO_FIELDS.forEach(f => { if (v[f]) delete v[f]; }));
          localStorage.setItem('vtp4_vehicles', JSON.stringify(vs));
        } catch(_) {}
        try { localStorage.setItem('vtp4_' + k, JSON.stringify(d)); } catch(e2) {
          console.error('localStorage write failed after cleanup:', k, e2.message);
        }
      }
    }
  },
  _lone(k, id) { return this._lget(k).find(x => x.id === id) || null; },

  // ── Password store — localStorage only, keyed by username ─────────────
  _pwKey(username) { return 'vtp4_pw_' + username; },
  savePassword(username, password) {
    try { localStorage.setItem(this._pwKey(username), password); } catch(e) {}
  },
  getPassword(username) {
    return localStorage.getItem(this._pwKey(username)) || '';
  },
  deletePassword(username) {
    try { localStorage.removeItem(this._pwKey(username)); } catch(e) {}
  },

  // ── Generic Firestore + localStorage CRUD ────────────────────────────
  async getAll(col) {
    if (this._online) {
      try {
        const snap = await this._db.collection(col).get();
        const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        this._lset(col, data);
        return data;
      } catch(e) { console.warn('Firestore getAll failed:', e); }
    }
    return this._lget(col);
  },

  async set(col, id, data) {
    const PHOTO_FIELDS = ['dpcPhoto','godownPhoto','dpcDispatchPhoto'];

    // Build Firestore-safe copy (no photos, no nulls → deleteField)
    const fsData = { ...data };
    PHOTO_FIELDS.forEach(f => { if (fsData[f] && String(fsData[f]).startsWith('data:')) delete fsData[f]; });
    if (this._online) {
      Object.keys(fsData).forEach(k => {
        if (fsData[k] === null) fsData[k] = firebase.firestore.FieldValue.delete();
      });
    }

    // Build localStorage copy (no photos, no nulls)
    const localItem = { id };
    Object.keys(data).forEach(k => {
      if (data[k] !== null && !(PHOTO_FIELDS.includes(k) && String(data[k]).startsWith('data:'))) {
        localItem[k] = data[k];
      }
    });
    localItem._updatedAt = Date.now();

    // Save photos separately to avoid quota issues
    PHOTO_FIELDS.forEach(f => {
      if (data[f] && String(data[f]).startsWith('data:')) {
        try { localStorage.setItem('vtp4_photo_' + id + '_' + f, data[f]); } catch(_) {}
      }
    });

    const local = this._lget(col);
    const idx = local.findIndex(x => x.id === id);
    if (idx >= 0) local[idx] = localItem; else local.unshift(localItem);
    this._lset(col, local);

    if (this._online) {
      try {
        await this._db.collection(col).doc(id).set(
          { ...fsData, _updatedAt: firebase.firestore.FieldValue.serverTimestamp() },
          { merge: true }
        );
      } catch(e) { console.warn('Firestore set failed:', e); }
    }
    this._notify(col);
    return localItem;
  },

  async delete(col, id) {
    const local = this._lget(col).filter(x => x.id !== id);
    this._lset(col, local);
    if (this._online) {
      try { await this._db.collection(col).doc(id).delete(); } catch(e) {}
    }
    this._notify(col);
  },

  // ── User-specific Firestore CRUD (password stays in localStorage) ─────
  async saveUser(record) {
    // record must have: id, name, username, password, role, active, mobile
    // + dpcId/dpcName OR godownId/godownName

    // 1. Store password locally only
    this.savePassword(record.username, record.password);

    // 2. Build Firestore doc (no password)
    const fsRecord = { ...record };
    delete fsRecord.id;
    delete fsRecord.password;

    // 3. Write to Firestore if online
    if (this._online) {
      try {
        await this._db.collection('users').doc(record.id).set(
          { ...fsRecord, _updatedAt: firebase.firestore.FieldValue.serverTimestamp() },
          { merge: true }
        );
      } catch(e) { console.warn('Firestore user save failed:', e); }
    }

    // 4. Merge into localStorage cache (with password, for login)
    const local = this._lget('users');
    const idx = local.findIndex(u => u.id === record.id);
    if (idx >= 0) local[idx] = record; else local.unshift(record);
    this._lset('users', local);

    this._notify('users');
    return record;
  },

  async deleteUser(id) {
    // Remove password from localStorage
    const local = this._lget('users');
    const u = local.find(x => x.id === id);
    if (u) this.deletePassword(u.username);

    // Remove from localStorage cache
    this._lset('users', local.filter(x => x.id !== id));

    // Remove from Firestore
    if (this._online) {
      try { await this._db.collection('users').doc(id).delete(); } catch(e) {}
    }
    this._notify('users');
  },

  // Load all users: fetch from Firestore, merge passwords from localStorage
  async getAllUsers() {
    let users = [];
    if (this._online) {
      try {
        const snap = await this._db.collection('users').get();
        users = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      } catch(e) {
        console.warn('Firestore users fetch failed, using cache:', e);
        users = this._lget('users');
      }
    } else {
      users = this._lget('users');
    }
    // Attach passwords from localStorage
    users = users.map(u => ({ ...u, password: this.getPassword(u.username) || u.password || '' }));
    // Update local cache
    this._lset('users', users);
    return users;
  },

  listen(col, cb) {
    cb(this._lget(col));
    this.onChange(col, cb);
    if (this._online) {
      const unsub = this._db.collection(col).onSnapshot(snap => {
        const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        this._lset(col, data);
        cb(data);
      }, err => console.warn('Firestore listener error:', err));
      this._subs.push(unsub);
    }
  },

  // Listen to users — reattach passwords from localStorage on every snapshot
  listenUsers(cb) {
    const hydrate = (users) => {
      const hydrated = users.map(u => ({ ...u, password: this.getPassword(u.username) || u.password || '' }));
      this._lset('users', hydrated);
      cb(hydrated);
    };
    hydrate(this._lget('users'));
    this.onChange('users', cb);
    if (this._online) {
      const unsub = this._db.collection('users').onSnapshot(snap => {
        const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        hydrate(data);
      }, err => console.warn('Firestore users listener error:', err));
      this._subs.push(unsub);
    }
  },

  _notify(col) { (this._changeCallbacks[col] || []).forEach(fn => fn(this._lget(col))); },
  onChange(col, fn) {
    if (!this._changeCallbacks[col]) this._changeCallbacks[col] = [];
    this._changeCallbacks[col].push(fn);
  },
  unsubscribeAll() { this._subs.forEach(u => u()); this._subs = []; }
};

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let S = {
  user: null,
  vehicles: [], users: [], dpcs: [], godowns: [],

// HELPERS
// ═══════════════════════════════════════════════════════════
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
function fmt(ts) { return new Date(ts).toLocaleString('en-IN',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit',hour12:true}); }
function nowStr() { return fmt(Date.now()); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function statusOf(v) {
  if (v.godownArrival) return { text:'Delivered', cls:'chip-godown' };
  if (v.dpcDispatched) return { text:'DPC Dispatched', cls:'chip-dpc-dispatch' };
  if (v.dpcArrival)    return { text:'At DPC', cls:'chip-dpc' };
  return { text:'Dispatched', cls:'chip-dispatched' };
}
function isDelayed(v) {
  if (v.godownArrival) return false;
  return (Date.now() - (v._dpcDispatchMs || v._dpcMs || v._dispatchMs || Date.now())) > 4*3600000;
}
function minToHM(m) { if (!m||m<=0) return '—'; if (m<60) return m+'m'; return Math.floor(m/60)+'h '+(m%60)+'m'; }
function avgMs(arr) { if (!arr.length) return 0; return arr.reduce((a,b)=>a+b,0)/arr.length; }
function tlHtml(v) {
  const a=!!v.dpcArrival,d=!!v.dpcDispatched,g=!!v.godownArrival;
  const s=(a2,pend,cur)=>a2?'done':cur?'cur':'pend';
  const s1='done', s2=s(a,!a,!a), s3=s(d,!d&&a,!d&&a), s4=s(g,!g&&d,!g&&d);
  return `<div class="tl-row">
    <div class="tl-step"><div class="tl-dot ${s1}"></div><span class="tl-lbl ${s1}">Entry</span></div>
    <div class="tl-line"></div>
    <div class="tl-step"><div class="tl-dot ${s2}"></div><span class="tl-lbl ${s2}">DPC</span></div>
    <div class="tl-line"></div>
    <div class="tl-step"><div class="tl-dot ${s3}"></div><span class="tl-lbl ${s3}">Dispatched</span></div>
    <div class="tl-line"></div>
    <div class="tl-step"><div class="tl-dot ${s4}"></div><span class="tl-lbl ${s4}">Godown</span></div>
  </div>`;
}
function snack(msg, type='ok') {
  const c=document.getElementById('snacks');
  const el=document.createElement('div');
  el.className=`snack ${type}`;
  el.innerHTML=`<span class="mi sm">${type==='ok'?'check_circle':type==='err'?'error':'warning'}</span>${esc(msg)}`;
  c.appendChild(el);
  setTimeout(()=>el.remove(),3500);
}

// AUTH

let _loginRole = 'admin';
function selRole(r) {
  _loginRole = r;
  document.querySelectorAll('.role-tab').forEach(t => t.classList.toggle('active', t.dataset.role===r));
  document.getElementById('l-user').value = '';
  document.getElementById('l-pass').value = '';
  document.getElementById('l-err').style.display = 'none';
}
function doLogin() {
  const u = document.getElementById('l-user').value.trim();
  const p = document.getElementById('l-pass').value;
  const showErr = msg => { const el=document.getElementById('l-err'); el.style.display='flex'; document.getElementById('l-err-text').textContent=msg; };
  if (!u || !p) { showErr('Please enter username and password'); return; }

  // Check built-in accounts first
  const builtIn = {
    admin: { id:'admin', name:'Administrator', username:'admin', password:'Admin@123', role:'admin', active:true },
    entry: { id:'entry', name:'Entry Operator', username:'entry', password:'Entry@123', role:'entry', active:true }
  };
  let found = null;
  if (builtIn[u] && builtIn[u].password === p) { found = builtIn[u]; }
  else {
    const users = DB._lget('users');
    found = users.find(x => x.username===u && x.password===p && x.active);
  }
  if (!found) { showErr('Invalid username or password'); return; }
  // Auto-select the correct role tab based on the found user — no manual tab selection needed
  _loginRole = found.role;
  document.querySelectorAll('.role-tab').forEach(t => t.classList.toggle('active', t.dataset.role===_loginRole));

  S.user = found;
  document.getElementById('l-err').style.display = 'none';
  bootApp();
}
function doLogout() {
  S.user = null; S.page = 'dashboard';
  document.getElementById('app-wrap').style.display = 'none';
  document.getElementById('login-wrap').style.display = 'flex';
  document.getElementById('l-pass').value = '';
  killCharts();
  DB.unsubscribeAll();
}

// ═══════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════
async function bootApp() {
  document.getElementById('login-wrap').style.display = 'none';
  document.getElementById('app-wrap').style.display = 'flex';
  const u = S.user;
  const initials = u.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  document.getElementById('nav-avatar').textContent = initials;
  document.getElementById('nav-uname').textContent = u.name;
  document.getElementById('nav-urole').textContent = roleLabel(u.role);
  document.getElementById('role-chip').textContent = roleLabel(u.role);

  // Load all data — users fetched from Firestore with passwords merged from localStorage
  [S.vehicles, S.users, S.dpcs, S.godowns] = await Promise.all([
    DB.getAll('vehicles'),
    DB.getAllUsers(),
    DB.getAll('dpcs'),
    DB.getAll('godowns'),
  ]);

  // Real-time listeners
  DB.listen('vehicles', d => { S.vehicles = d; if (S.page) renderPage(); updateNotifDot(); });
  DB.listenUsers(d => { S.users = d; if (['users','dpc_centers','godown_centers'].includes(S.page)) renderPage(); });
  DB.listen('dpcs',     d => { S.dpcs = d; });
  DB.listen('godowns',  d => { S.godowns = d; });

  buildNav();
  goTo('dashboard');
  updateNotifDot();
  if (window.innerWidth < 768) document.querySelector('.mob-menu-btn').style.display = 'flex';
}

function roleLabel(r) {
  return {admin:'Administrator',entry:'Entry Operator',dpc:'DPC In-Charge',godown:'Godown In-Charge'}[r] || r;
}

function myVehicles() {
  const u = S.user;
  if (u.role === 'admin' || u.role === 'entry') return S.vehicles;
  if (u.role === 'dpc') return S.vehicles.filter(v => v.dpcId === u.dpcId);
  if (u.role === 'godown') return S.vehicles.filter(v => v.godownId === u.godownId);
  return [];
}

function renderPage() {
  const pb = document.getElementById('page-body');
  const role = S.user.role;
  const p = S.page;
  let html = '';
  if (p === 'dashboard') {
    if (role === 'admin') html = renderAdminDash();
    else if (role === 'entry') html = renderEntryDash();
    else if (role === 'dpc') html = renderDPCDash();
    else html = renderGodownDash();
  } else if (p === 'analytics') html = renderAnalytics();
  else if (p === 'all_vehicles') html = renderVehicleListPage('all');
  else if (p === 'pending') html = renderVehicleListPage('pending');
  else if (p === 'confirmed') html = renderVehicleListPage('confirmed');
  else if (p === 'dpc_dispatch') html = renderDPCDispatchPage();
  else if (p === 'incoming') html = renderVehicleListPage('incoming');
  else if (p === 'delivered') html = renderVehicleListPage('delivered');
  else if (p === 'dispatch') html = renderDispatchPage();
  else if (p === 'reports') html = renderReportsPage();
  else if (p === 'users') { S.users=DB._lget('users'); html = renderUsersPage(); }
  else if (p === 'dpc_centers') { S.users=DB._lget('users'); html = renderDPCCentersPage(); }
  else if (p === 'godown_centers') { S.users=DB._lget('users'); html = renderGodownCentersPage(); }
  else if (p === 'firebase_test') html = renderFirebaseTestPage();
  pb.innerHTML = `<div style="animation:fadeIn .25s ease">${html}</div>`;
  initCharts();
}

// ═══════════════════════════════════════════════════════════
// DPC DASHBOARD
// ═══════════════════════════════════════════════════════════
function renderDPCDash() {
  const mv=myVehicles();
  const pending=mv.filter(x=>!x.dpcArrival);
  const arrived=mv.filter(x=>x.dpcArrival&&!x.dpcDispatched);
  const dispatched2=mv.filter(x=>x.dpcDispatched);
  const totalA=dispatched2.reduce((a,b)=>a+(+b.gradeABags||0),0);
  const totalC=dispatched2.reduce((a,b)=>a+(+b.gradeCBags||0),0);
  const dpcTimes=mv.filter(x=>x._dpcMs&&x._dispatchMs).map(x=>x._dpcMs-x._dispatchMs);
  const avgDpc=minToHM(Math.round(avgMs(dpcTimes)/60000));
  return `
  <div class="kpi-grid g4">
    <div class="kpi-card kpi-amber"><div class="kpi-icon"><span class="mi lg">pending</span></div><div class="kpi-label">Awaiting Arrival</div><div class="kpi-val">${pending.length}</div><div class="kpi-sub">En route to my DPC</div></div>
    <div class="kpi-card kpi-blue"><div class="kpi-icon"><span class="mi lg">factory</span></div><div class="kpi-label">Arrived at DPC</div><div class="kpi-val">${arrived.length}</div><div class="kpi-sub">Awaiting dispatch details</div></div>
    <div class="kpi-card kpi-green"><div class="kpi-icon"><span class="mi lg">grain</span></div><div class="kpi-label">Grade A Bags</div><div class="kpi-val">${totalA}</div><div class="kpi-sub">Dispatched to godown</div></div>
    <div class="kpi-card kpi-teal"><div class="kpi-icon"><span class="mi lg">grain</span></div><div class="kpi-label">Grade C Bags</div><div class="kpi-val">${totalC}</div><div class="kpi-sub">Dispatched to godown</div></div>
  </div>
  <div style="background:#e8f0fe;border:1px solid #c5d8f8;border-radius:var(--r8);padding:12px 16px;margin-bottom:20px;font-size:13px;color:var(--md-secondary);display:flex;align-items:center;gap:8px">
    <span class="mi sm">info</span> Showing vehicles for <b>${S.user.dpcName}</b> only.
  </div>
  <div class="g65">
    <div>
      <div class="md-card" style="margin-bottom:20px">
        <div class="card-header"><div class="card-title"><span class="mi sm">pending</span> Pending Arrivals</div><button class="md-btn md-btn-outlined sm" onclick="goTo('pending')">View All</button></div>
        <div class="card-body">
          ${pending.length===0?`<div class="empty-state" style="padding:16px"><div class="empty-icon"><span class="mi xl">check_circle</span></div><p>All vehicles confirmed</p></div>`:``}
          <div class="v-list">
            ${pending.slice(0,3).map(x=>renderVCard(x,'dpc')).join('')}
          </div>
        </div>
      </div>
      <div class="md-card">
        <div class="card-header"><div class="card-title" style="color:var(--md-warning)"><span class="mi sm">send</span> Ready to Dispatch</div><button class="md-btn md-btn-filled amber sm" onclick="goTo('dpc_dispatch')">Fill Details (${arrived.length})</button></div>
        <div class="card-body">
          ${arrived.length===0?`<div class="empty-state" style="padding:16px"><p>No vehicles awaiting dispatch</p></div>`:``}
          <div class="v-list">${arrived.slice(0,3).map(x=>renderVCard(x,'dpc')).join('')}</div>
        </div>
      </div>
    </div>
    <div>
      <div class="md-card" style="margin-bottom:20px">
        <div class="card-header"><div class="card-title"><span class="mi sm">schedule</span> Avg Transit to DPC</div></div>
        <div class="card-body"><div style="font-size:28px;font-family:var(--fm);color:var(--md-primary);font-weight:500">${avgDpc}</div><div style="font-size:12px;color:var(--md-on-surface-variant);margin-top:4px">Average dispatch to DPC arrival time</div></div>
      </div>
      <div class="md-card">
        <div class="card-header"><div class="card-title"><span class="mi sm">bar_chart</span> Grade Breakdown</div></div>
        <div class="card-body">
          <div class="donut-wrap">
            <canvas id="ch-grade-donut" class="donut-canvas"></canvas>
            <div class="donut-legend">
              <div class="dl-item"><div class="dl-dot" style="background:#1e8e3e"></div><span class="dl-name">Grade A</span><span class="dl-val">${totalA}</span></div>
              <div class="dl-item"><div class="dl-dot" style="background:#1a73e8"></div><span class="dl-name">Grade C</span><span class="dl-val">${totalC}</span></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════
// GODOWN DASHBOARD

  return `
  <div class="kpi-grid g4">
    <div class="kpi-card kpi-amber"><div class="kpi-icon"><span class="mi lg">move_to_inbox</span></div><div class="kpi-label">Incoming Vehicles</div><div class="kpi-val">${incoming.length}</div><div class="kpi-sub">DPC cleared, en route</div></div>
    <div class="kpi-card kpi-green"><div class="kpi-icon"><span class="mi lg">inventory_2</span></div><div class="kpi-label">Total Delivered</div><div class="kpi-val">${delivered.length}</div><div class="kpi-sub">Received at my godown</div></div>
    <div class="kpi-card kpi-blue"><div class="kpi-icon"><span class="mi lg">grain</span></div><div class="kpi-label">Total Bags Received</div><div class="kpi-val">${totalBags.toLocaleString()}</div><div class="kpi-sub">Grade A: ${gradeA} · Grade C: ${gradeC}</div></div>

  </div>
  <div style="background:#e6f4ea;border:1px solid #a8d5b5;border-radius:var(--r8);padding:12px 16px;margin-bottom:20px;font-size:13px;color:#137333;display:flex;align-items:center;gap:8px">
    <span class="mi sm">info</span> Showing vehicles assigned to <b>${S.user.godownName}</b> only.
  </div>
  <div class="md-card" style="margin-bottom:20px">
    <div class="card-header"><div class="card-title"><span class="mi sm">move_to_inbox</span> Incoming — Awaiting Confirmation</div><button class="md-btn md-btn-outlined sm" onclick="goTo('incoming')">View All</button></div>
    <div class="card-body">
      ${incoming.length===0?`<div class="empty-state" style="padding:16px"><div class="empty-icon"><span class="mi xl">check_circle</span></div><p>No incoming vehicles</p></div>`:``}
      <div class="v-list">${incoming.slice(0,4).map(x=>renderVCard(x,'godown')).join('')}</div>
    </div>
  </div>
  <div class="md-card">
    <div class="card-header"><div class="card-title"><span class="mi sm">inventory_2</span> Recent Deliveries</div></div>
    <div class="card-body np"><div class="tw"><table class="md-table">
      <thead><tr><th>Vehicle</th><th>Driver</th><th>Paddy Variety</th><th>Grade A</th><th>Grade C</th><th>Arrived</th><th></th></tr></thead>
      <tbody>
        ${delivered.slice(0,6).map(x=>`<tr>
          <td class="vnum-cell">${esc(x.vehicleNumber)}</td><td>${esc(x.driverName)}</td>
          <td>${esc(x.paddyVariety||'—')}</td>
          <td><span class="grade-box grade-a">${x.gradeABags||0}</span></td>
          <td><span class="grade-box grade-c">${x.gradeCBags||0}</span></td>
          <td style="font-size:12px;color:var(--md-on-surface-variant)">${esc(x.godownArrival||'')}</td>
          <td class="action-cell"><button class="md-btn md-btn-text xs" onclick="openView('${x.id}')">Details</button></td>
        </tr>`).join('')}
        ${delivered.length===0?`<tr><td colspan="7" style="text-align:center;padding:24px;color:var(--md-on-surface-variant)">No deliveries yet</td></tr>`:''}

  </div>`;

// ═══════════════════════════════════════════════════════════
// VEHICLE CARD (shared)
// ═══════════════════════════════════════════════════════════
function renderVCard(x, role) {
  const st=statusOf(x), del=isDelayed(x);
  const canConfirmDpc  = role==='dpc'    && !x.dpcArrival;
  const canDpcDispatch = role==='dpc'    && x.dpcArrival && !x.dpcDispatched;
  const canConfirmGod  = role==='godown' && x.dpcDispatched && !x.godownArrival;
  const paddyLine = x.paddyVariety ? `<span class="vm-item">Paddy: <b>${esc(x.paddyVariety)}</b></span><span class="vm-item">Grade A: <b>${x.gradeABags||0}</b></span><span class="vm-item">Grade C: <b>${x.gradeCBags||0}</b></span>` : '';
  const bcLine = x.billCollectorName ? `<span class="vm-item">BC: <b>${esc(x.billCollectorName)}</b> ${esc(x.billCollectorMobile||'')}</span>` : '';
  return `<div class="v-card">
    <div class="v-card-top">
      <div class="v-num">${esc(x.vehicleNumber)}</div>
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
        ${del?`<span class="chip chip-delayed">Delayed</span>`:''}
        <span class="chip ${st.cls}">${st.text}</span>
      </div>
    </div>
    <div class="v-meta">
      <span class="vm-item">Driver: <b>${esc(x.driverName)}</b></span>
      <span class="vm-item">📞 <b>${esc(x.driverMobile)}</b></span>
      <span class="vm-item">DPC: <b>${esc(x.dpcName)}</b></span>
      <span class="vm-item">Godown: <b>${esc(x.unloadingPoint)}</b></span>
      <span class="vm-item">Bags: <b>${x.bags}</b></span>
      ${paddyLine}${bcLine}
    </div>
    ${tlHtml(x)}
    <div class="v-actions">
      <button class="md-btn md-btn-outlined sm" onclick="openView('${x.id}')"><span class="mi sm">info</span> Details</button>
      ${canConfirmDpc?`<button class="md-btn md-btn-filled sm" onclick="openConfirm('${x.id}','dpc')"><span class="mi sm">check</span> Confirm DPC Arrival</button>`:``}
      ${canDpcDispatch?`<button class="md-btn md-btn-filled amber sm" onclick="openDPCDispatch('${x.id}')"><span class="mi sm">send</span> Fill &amp; Dispatch</button>`:``}
      ${canConfirmGod?`<button class="md-btn md-btn-filled green sm" onclick="openConfirm('${x.id}','godown')"><span class="mi sm">check</span> Confirm Godown Arrival</button>`:``}
      ${x.dpcArrival&&!x.dpcDispatched&&role==='dpc'?`<span class="v-confirm-tag"><span class="mi sm">check_circle</span> DPC arrived ${esc(x.dpcArrival)}</span>`:``}
      ${x.dpcDispatched&&!x.godownArrival&&role==='dpc'?`<span class="v-confirm-tag"><span class="mi sm">send</span> Dispatched to godown</span>`:``}
      ${x.godownArrival?`<span class="v-confirm-tag"><span class="mi sm">inventory_2</span> Delivered ${esc(x.godownArrival)}</span>`:``}
      ${(role==='admin'||role==='entry')?`<button class="md-btn md-btn-text sm" style="color:var(--md-error)" onclick="deleteVehicle('${x.id}')"><span class="mi sm">delete</span></button>`:``}
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════
// VEHICLE LIST PAGE
// ═══════════════════════════════════════════════════════════
function renderVehicleListPage(type) {
  let items = myVehicles();
  let title='', empty='';
  if (type==='all') { title='All Vehicles'; empty='No vehicles dispatched.'; }
  else if (type==='pending') { items=items.filter(x=>!x.dpcArrival); title='Pending DPC Arrivals'; empty='All vehicles confirmed at DPC.'; }
  else if (type==='confirmed') { items=items.filter(x=>x.dpcArrival); title='DPC Confirmed'; empty='No confirmations yet.'; }
  else if (type==='incoming') { items=items.filter(x=>x.dpcDispatched&&!x.godownArrival); title='Incoming to Godown'; empty='No vehicles in transit.'; }
  else if (type==='delivered') { items=items.filter(x=>x.godownArrival); title='Delivered to Godown'; empty='No deliveries confirmed.'; }
  const q=S.search.toLowerCase();
  if (q) items=items.filter(x=>[x.vehicleNumber,x.driverName,x.dpcName,x.unloadingPoint,x.paddyVariety].some(f=>(f||'').toLowerCase().includes(q)));
  return `
  <div class="md-card">
    <div class="card-header">
      <div class="card-title"><span class="mi sm">local_shipping</span> ${title} <span style="background:var(--md-primary-light);color:var(--md-primary);padding:2px 8px;border-radius:var(--r50);font-size:11px;font-weight:700;margin-left:4px">${items.length}</span></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <div class="search-wrap"><span class="mi search-icon">search</span><input class="md-input" placeholder="Search…" value="${esc(S.search)}" oninput="S.search=this.value;renderPage()" style="height:36px;font-size:13px"></div>
        <button class="md-btn md-btn-outlined sm" onclick="exportCSV()"><span class="mi sm">download</span> CSV</button>
        ${S.user.role==='entry'||S.user.role==='admin'?`<button class="md-btn md-btn-filled sm" onclick="goTo('dispatch')"><span class="mi sm">add</span> Dispatch</button>`:``}
      </div>
    </div>
    <div class="card-body">
      ${items.length===0?`<div class="empty-state"><div class="empty-icon"><span class="mi xl">local_shipping</span></div><p>${empty}</p></div>`:`<div class="v-list">${items.map(x=>renderVCard(x,S.user.role)).join('')}</div>`}
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════
// DPC DISPATCH PAGE
// ═══════════════════════════════════════════════════════════
function renderDPCDispatchPage() {
  const mv = myVehicles();
  const awaiting=mv.filter(x=>x.dpcArrival&&!x.dpcDispatched);
  const done=mv.filter(x=>x.dpcDispatched);
  const totalA=done.reduce((a,b)=>a+(+b.gradeABags||0),0);
  const totalC=done.reduce((a,b)=>a+(+b.gradeCBags||0),0);
  const q=S.search.toLowerCase();
  const fAw=q?awaiting.filter(x=>[x.vehicleNumber,x.driverName].some(f=>(f||'').toLowerCase().includes(q))):awaiting;
  const fDone=q?done.filter(x=>[x.vehicleNumber,x.driverName,x.paddyVariety].some(f=>(f||'').toLowerCase().includes(q))):done;
  return `
  <div class="kpi-grid g3">
    <div class="kpi-card kpi-amber"><div class="kpi-icon"><span class="mi lg">pending</span></div><div class="kpi-label">Awaiting Dispatch</div><div class="kpi-val">${awaiting.length}</div><div class="kpi-sub">Paddy details not yet filled</div></div>
    <div class="kpi-card kpi-green"><div class="kpi-icon"><span class="mi lg">grain</span></div><div class="kpi-label">Grade A Dispatched</div><div class="kpi-val">${totalA.toLocaleString()}</div><div class="kpi-sub">Bags</div></div>
    <div class="kpi-card kpi-blue"><div class="kpi-icon"><span class="mi lg">grain</span></div><div class="kpi-label">Grade C Dispatched</div><div class="kpi-val">${totalC.toLocaleString()}</div><div class="kpi-sub">Bags</div></div>
  </div>
  <div class="md-card" style="margin-bottom:20px">
    <div class="card-header">
      <div class="card-title" style="color:var(--md-warning)"><span class="mi sm">send</span> Awaiting Dispatch Details <span style="background:#fef0cd;color:#b35900;padding:2px 8px;border-radius:var(--r50);font-size:11px;font-weight:700;margin-left:4px">${awaiting.length}</span></div>
      <div class="search-wrap"><span class="mi search-icon">search</span><input class="md-input" placeholder="Search…" value="${esc(S.search)}" oninput="S.search=this.value;renderPage()" style="height:32px;font-size:13px"></div>
    </div>
    <div class="card-body">
      ${fAw.length===0?`<div class="empty-state" style="padding:24px"><div class="empty-icon"><span class="mi xl">check_circle</span></div><p>All arrived vehicles dispatched</p></div>`:`<div class="v-list">${fAw.map(x=>renderVCard(x,'dpc')).join('')}</div>`}
    </div>
  </div>
  <div class="md-card">
    <div class="card-header">
      <div class="card-title" style="color:var(--md-success)"><span class="mi sm">check_circle</span> Dispatched to Godown</div>
      <button class="md-btn md-btn-outlined sm" onclick="exportCSV()"><span class="mi sm">download</span> Export</button>
    </div>
    <div class="card-body np"><div class="tw"><table class="md-table">
      <thead><tr><th>Vehicle</th><th>Driver</th><th>Paddy Variety</th><th>Grade A</th><th>Grade C</th><th>Bill Collector</th><th>BC Mobile</th><th>Dispatched</th><th></th></tr></thead>
      <tbody>
        ${fDone.map(x=>`<tr>
          <td class="vnum-cell">${esc(x.vehicleNumber)}</td>
          <td>${esc(x.driverName)}</td>
          <td><b style="color:var(--md-warning)">${esc(x.paddyVariety||'—')}</b></td>
          <td><span class="grade-box grade-a">${x.gradeABags||0}</span></td>
          <td><span class="grade-box grade-c">${x.gradeCBags||0}</span></td>
          <td>${esc(x.billCollectorName||'—')}</td>
          <td style="font-family:var(--fm);font-size:12px">${esc(x.billCollectorMobile||'—')}</td>
          <td style="font-size:12px;color:var(--md-on-surface-variant)">${esc(x.dpcDispatched||'')}</td>
          <td class="action-cell"><button class="md-btn md-btn-text xs" onclick="openView('${x.id}')">View</button></td>
        </tr>`).join('')}
        ${fDone.length===0?`<tr><td colspan="9" style="text-align:center;padding:24px;color:var(--md-on-surface-variant)">No dispatches yet</td></tr>`:''}
      </tbody>
    </table></div></div>
  </div>`;
}

async function submitDispatch() {
  const get = id => (document.getElementById(id)?.value||'').trim();
  const vnum = get('dv-vnum').toUpperCase();
  const dname = get('dv-dname'), mob = get('dv-mob'), bags = get('dv-bags');
  const dpcSel = get('dv-dpc'), dpcName = get('dv-dpc-name');
  const godSel = get('dv-god'), godName = get('dv-god-name');
  const fDpc = dpcSel && dpcSel!=='__other__' ? (S.dpcs.find(d=>d.id===dpcSel)?.name||dpcName) : dpcName;
  const fGod = godSel && godSel!=='__other__' ? (S.godowns.find(g=>g.id===godSel)?.name||godName) : godName;
  const fDpcId = dpcSel && dpcSel!=='__other__' ? dpcSel : null;
  const fGodId = godSel && godSel!=='__other__' ? godSel : null;
  const showErr = m => { document.getElementById('dv-err').style.display='flex'; document.getElementById('dv-err-text').textContent=m; };
  if (!vnum||!dname||!mob||!bags||!fDpc||!fGod) { showErr('Please fill all required fields'); return; }
  if (!/^\d{10}$/.test(mob)) { showErr('Driver mobile must be 10 digits'); return; }
  if (S.vehicles.find(v=>v.vehicleNumber===vnum&&!v.godownArrival)) { showErr(`Vehicle ${vnum} is already active`); return; }
  const id = uid();
  const now = Date.now();
  await DB.set('vehicles', id, {
    vehicleNumber:vnum, driverName:dname, driverMobile:mob, bags:+bags,
    dpcId:fDpcId, dpcName:fDpc, godownId:fGodId, unloadingPoint:fGod,
    dispatchedAt:fmt(now), _dispatchMs:now, entryBy:S.user.id
  });
  snack(`Vehicle ${vnum} dispatched`);
  goTo('all_vehicles');
}

function renderAnalytics() {
  const v = myVehicles();
  const total=v.length, delivered=v.filter(x=>x.godownArrival).length;
  const rate=total>0?Math.round(delivered/total*100):0;
  const dpcTimes=v.filter(x=>x._dpcMs&&x._dispatchMs).map(x=>x._dpcMs-x._dispatchMs);
  const godTimes=v.filter(x=>x._godMs&&x._dpcDispatchMs).map(x=>x._godMs-x._dpcDispatchMs);
  const totalTimes=v.filter(x=>x._godMs&&x._dispatchMs).map(x=>x._godMs-x._dispatchMs);
  const avgDpc=minToHM(Math.round(avgMs(dpcTimes)/60000));
  const avgGod=minToHM(Math.round(avgMs(godTimes)/60000));
  const avgTotal=minToHM(Math.round(avgMs(totalTimes)/60000));
  const totalBags=v.reduce((a,b)=>a+(+b.bags||0),0);
  const gradeA=v.filter(x=>x.gradeABags).reduce((a,b)=>a+(+b.gradeABags||0),0);
  const gradeC=v.filter(x=>x.gradeCBags).reduce((a,b)=>a+(+b.gradeCBags||0),0);
  const dpcMap={}, godMap={}, bagsDpc={}, bagsGod={};

    godMap[x.unloadingPoint]=(godMap[x.unloadingPoint]||0)+1;

  </div>
  <div class="g2c">
    <div class="md-card">

      <div class="card-body"><div class="chart-wrap tall"><canvas id="ch-dpc-bar"></canvas></div></div>

async function submitConfirm(id, type) {
  if (!S.tempPhoto) { document.getElementById('md-ph-err').style.display='flex'; return; }
  const remarks=(document.getElementById('md-remarks')?.value||'').trim();
  const v=S.vehicles.find(x=>x.id===id); if(!v) return;
  const now=Date.now();
  const upd={...v};
  if (type==='dpc') { upd.dpcArrival=fmt(now); upd._dpcMs=now; upd.dpcRemarks=remarks; upd.dpcPhoto=S.tempPhoto; }

function saveOfficer(editId) {
  // Collect all form values while modal DOM is still alive
  const nameEl     = document.getElementById('au-name');
  const mobEl      = document.getElementById('au-mob');
  const userEl     = document.getElementById('au-user');
  const passEl     = document.getElementById('au-pass');
  const roleEl     = document.getElementById('au-role');
  const dpcEl      = document.getElementById('au-dpc');
  const godEl      = document.getElementById('au-god');
  const errEl      = document.getElementById('au-err');
  const errTxtEl   = document.getElementById('au-err-txt');

  const name     = nameEl ? nameEl.value.trim() : '';
  const mobile   = mobEl  ? mobEl.value.trim()  : '';
  const username = userEl ? userEl.value.trim() : '';
  const pass     = passEl ? passEl.value.trim() : '';
  const role     = roleEl ? roleEl.value        : 'dpc';
  const dpcId    = dpcEl  ? dpcEl.value.trim()  : '';
  const godId    = godEl  ? godEl.value.trim()  : '';

  function showErr(msg) {
    if (errEl)    errEl.style.display = 'flex';
    if (errTxtEl) errTxtEl.textContent = msg;
  }

  // Validation
  if (!name)                         { showErr('Full name is required'); return; }
  if (!username)                     { showErr('Username is required'); return; }
  if (!editId && !pass)              { showErr('Password is required for new officers'); return; }
  if (role === 'dpc'    && !dpcId)   { showErr('Please assign a DPC center'); return; }
  if (role === 'godown' && !godId)   { showErr('Please assign a Godown'); return; }

  // Read fresh data from localStorage
  const allUsers   = DB._lget('users');
  const allDpcs    = DB._lget('dpcs');
  const allGodowns = DB._lget('godowns');

  // Duplicate username check
  const dup = allUsers.find(u => u.username === username && u.id !== editId);
  if (dup) { showErr('Username "' + username + '" is already taken'); return; }

  // Find assigned center name
  const dpcObj = allDpcs.find(d => d.id === dpcId);
  const godObj = allGodowns.find(g => g.id === godId);

  // Build user record
  const recordId = editId || uid();
  const existing = editId ? allUsers.find(u => u.id === editId) : null;

  const record = {
    id:       recordId,
    name:     name,
    mobile:   mobile,
    username: username,
    password: pass || (existing ? existing.password : ''),
    role:     role,
    active:   existing ? (existing.active !== undefined ? existing.active : true) : true,
  };

  if (role === 'dpc') {
    record.dpcId    = dpcId;
    record.dpcName  = dpcObj ? dpcObj.name : dpcId;
  } else {
    record.godownId   = godId;
    record.godownName = godObj ? godObj.name : godId;
  }

  // Save user — Firestore (no password) + password in localStorage
  DB.saveUser(record).then(() => {
    S.users = DB._lget('users');
    if (['users','dpc_centers','godown_centers'].includes(S.page)) renderPage();
  });

  // Update local cache immediately, close modal and re-render without waiting
  DB.savePassword(record.username, record.password);
  const updatedUsers = allUsers.filter(u => u.id !== recordId);
  updatedUsers.unshift(record);
  DB._lset('users', updatedUsers);
  closeModal();
  S.users = DB._lget('users');
  snack('Officer ' + (editId ? 'updated' : 'added') + ': ' + name);
  renderPage();
}

function onPhotoChange(e) {
  const f=e.target.files[0]; if(!f) return;

  r.onload=ev=>{

    const errEl=document.getElementById('md-ph-err');

    else if(zone){const img=document.createElement('img');img.src=S.tempPhoto;img.className='proof-img';img.id='ph-prev';zone.after(img);}
  };
  r.readAsDataURL(f);
}

const CHART_OPTS={responsive:true,maintainAspectRatio:true,plugins:{legend:{display:false}},scales:{x:{grid:{color:'rgba(0,0,0,.06)'},ticks:{font:{family:'Roboto',size:11},color:'#5f6368'}},y:{grid:{color:'rgba(0,0,0,.06)'},ticks:{font:{family:'Roboto',size:11},color:'#5f6368'},beginAtZero:true}}};
const HBAR_OPTS={...CHART_OPTS,indexAxis:'y',scales:{...CHART_OPTS.scales,x:{...CHART_OPTS.scales.x},y:{...CHART_OPTS.scales.y,grid:{display:false}}}};
function makeChart(id,cfg){const el=document.getElementById(id);if(!el)return;killChart(id);Chart.defaults.font.family='Roboto';S.charts[id]=new Chart(el,cfg);}
function killChart(id){if(S.charts[id]){S.charts[id].destroy();delete S.charts[id];}}
function killCharts(){Object.keys(S.charts).forEach(killChart);}

function initCharts() {
  const v=myVehicles();
  const dispatched=v.filter(x=>!x.dpcArrival).length,atDpc=v.filter(x=>x.dpcArrival&&!x.dpcDispatched).length;
  const inTransit=v.filter(x=>x.dpcDispatched&&!x.godownArrival).length,delivered=v.filter(x=>x.godownArrival).length;
  const dpcMap={},godMap={},bagsDpc={},bagsGod={},paddyMap={};
  v.forEach(x=>{
    dpcMap[x.dpcName]=(dpcMap[x.dpcName]||0)+1;
    godMap[x.unloadingPoint]=(godMap[x.unloadingPoint]||0)+1;
    bagsDpc[x.dpcName]=(bagsDpc[x.dpcName]||0)+(+x.bags||0);
    bagsGod[x.unloadingPoint]=(bagsGod[x.unloadingPoint]||0)+(+x.bags||0);
    if(x.paddyVariety) paddyMap[x.paddyVariety]=(paddyMap[x.paddyVariety]||0)+1;
  });
  const shorten=s=>s.length>18?s.substring(0,16)+'…':s;

  if(document.getElementById('ch-donut'))
    makeChart('ch-donut',{type:'doughnut',data:{labels:['Dispatched','At DPC','In Transit','Delivered'],datasets:[{data:[dispatched,atDpc,inTransit,delivered],backgroundColor:['#e37400','#1a73e8','#7b1fa2','#1e8e3e'],borderColor:'#fff',borderWidth:3,hoverBorderWidth:0}]},options:{responsive:true,maintainAspectRatio:true,cutout:'72%',plugins:{legend:{display:false}}}});

  if(document.getElementById('ch-grade-donut')){
    const ga=v.filter(x=>x.gradeABags).reduce((a,b)=>a+(+b.gradeABags||0),0);
    const gc=v.filter(x=>x.gradeCBags).reduce((a,b)=>a+(+b.gradeCBags||0),0);
    makeChart('ch-grade-donut',{type:'doughnut',data:{labels:['Grade A','Grade C'],datasets:[{data:[ga,gc],backgroundColor:['#1e8e3e','#1a73e8'],borderColor:'#fff',borderWidth:3}]},options:{responsive:true,maintainAspectRatio:true,cutout:'72%',plugins:{legend:{display:false}}}});
  }

  const barData=(map,color)=>{const names=Object.keys(map).slice(0,6);return{labels:names.map(shorten),data:names.map(n=>map[n]),color};};

  if(document.getElementById('ch-dpc-bar')){const d=barData(dpcMap,'#1a73e8');makeChart('ch-dpc-bar',{type:'bar',data:{labels:d.labels,datasets:[{label:'Vehicles',data:d.data,backgroundColor:COLORS,borderRadius:4}]},options:HBAR_OPTS});}
  if(document.getElementById('ch-god-bar')){const d=barData(godMap,'#1e8e3e');makeChart('ch-god-bar',{type:'bar',data:{labels:d.labels,datasets:[{label:'Vehicles',data:d.data,backgroundColor:COLORS,borderRadius:4}]},options:HBAR_OPTS});}
  if(document.getElementById('ch-bags-dpc')){const names=Object.keys(bagsDpc).slice(0,6);makeChart('ch-bags-dpc',{type:'bar',data:{labels:names.map(shorten),datasets:[{label:'Bags',data:names.map(n=>bagsDpc[n]),backgroundColor:'#1a73e8',borderRadius:4}]},options:CHART_OPTS});}
  if(document.getElementById('ch-paddy')){const names=Object.keys(paddyMap).slice(0,6);makeChart('ch-paddy',{type:'bar',data:{labels:names.map(shorten),datasets:[{label:'Vehicles',data:names.map(n=>paddyMap[n]),backgroundColor:COLORS,borderRadius:4}]},options:CHART_OPTS});}
}

function getReportRows() {
  return myVehicles().map(v=>[
    v.vehicleNumber||'',v.driverName||'',v.driverMobile||'',v.dpcName||'',v.unloadingPoint||'',
    v.bags||0,v.dispatchedAt||'',v.dpcArrival||'',v.dpcDispatched||'',
    v.paddyVariety||'',v.gradeABags||0,v.gradeCBags||0,
    v.billCollectorName||'',v.billCollectorMobile||'',v.godownArrival||'',
    statusOf(v).text, isDelayed(v)?'Yes':'No',
    v._godMs&&v._dispatchMs?minToHM(Math.round((v._godMs-v._dispatchMs)/60000)):''
  ]);
}
const REPORT_HEADERS=['Vehicle No','Driver','Mobile','DPC','Godown','Bags','Dispatched At','DPC Arrival','DPC Dispatched','Paddy Variety','Grade A','Grade C','Bill Collector','BC Mobile','Godown Arrival','Status','Delayed','Total Transit'];

function exportCSV() {
  const rows=[REPORT_HEADERS,...getReportRows()];
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  dlFile('data:text/csv;charset=utf-8,'+encodeURIComponent(csv),`vehicletrack_${today()}.csv`);
  snack('CSV exported');
}

function exportExcel() {
  if(!window.XLSX){snack('SheetJS library loading…','warn');return;}
  const ws=XLSX.utils.aoa_to_sheet([REPORT_HEADERS,...getReportRows()]);
  ws['!cols']=REPORT_HEADERS.map((_,i)=>({wch:i<3?16:i<6?12:20}));
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Vehicle Movement');
  XLSX.writeFile(wb,`vehicletrack_${today()}.xlsx`);
  snack('Excel file downloaded');
}

function exportPDF() {
  if(!window.jspdf){snack('jsPDF loading…','warn');return;}
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'landscape',format:'a4'});
  doc.setFontSize(16);doc.setFont(undefined,'bold');
  doc.text('Vehicle Movement Report',14,16);
  doc.setFontSize(10);doc.setFont(undefined,'normal');
  doc.text(`Generated: ${new Date().toLocaleString('en-IN')}`,14,23);
  const v=myVehicles();
  const stats=`Total: ${v.length} | Delivered: ${v.filter(x=>x.godownArrival).length} | Delayed: ${v.filter(x=>isDelayed(x)).length}`;
  doc.text(stats,14,30);
  doc.autoTable({startY:34,head:[REPORT_HEADERS.slice(0,12)],body:getReportRows().map(r=>r.slice(0,12)),styles:{fontSize:7,cellPadding:2},headStyles:{fillColor:[26,115,232],textColor:255,fontStyle:'bold'},alternateRowStyles:{fillColor:[240,244,249]},columnStyles:{0:{fontStyle:'bold'}}});
  doc.save(`vehicletrack_${today()}.pdf`);
  snack('PDF report downloaded');

function exportPaddySummaryExcel() {
  if(!window.XLSX){snack('SheetJS library loading…','warn');return;}
  const v=myVehicles().filter(x=>x.paddyVariety);

  const dpcSummary={};
  v.forEach(x=>{
    if(!dpcSummary[x.dpcName]) dpcSummary[x.dpcName]={dpc:x.dpcName,vehicles:0,bags:0,gradeA:0,gradeC:0,varieties:{}};

// One-time cleanup: move any base64 photos already embedded in vtp4_vehicles
// out to separate keys, so they don't block localStorage quota
(function cleanupPhotos() {
  const photoFields = ['dpcPhoto','godownPhoto','dpcDispatchPhoto'];
  try {
    const raw = localStorage.getItem('vtp4_vehicles');
    if (!raw) return;
    const vehicles = JSON.parse(raw);
    let changed = false;
    vehicles.forEach(v => {
      photoFields.forEach(f => {
        if (v[f] && typeof v[f] === 'string' && v[f].startsWith('data:')) {
          try {
            localStorage.setItem('vtp4_photo_' + v.id + '_' + f, v[f]);
          } catch(e) { /* photo too large, discard */ }
          delete v[f];
          changed = true;
        }
      });
    });
    if (changed) localStorage.setItem('vtp4_vehicles', JSON.stringify(vehicles));
  } catch(e) { console.warn('cleanupPhotos failed:', e); }
})();

function pasteFbConfigJson() {
  const raw = prompt('Paste your full firebaseConfig JSON object:');
  if (!raw) return;
  try {
    // Extract the object even if it's wrapped in "const firebaseConfig = {...}"
    const match = raw.match(/\{[\s\S]*\}/);
    if (!match) { snack('Could not find a JSON object in the pasted text', 'err'); return; }
    const obj = JSON.parse(match[0]);
    const keys = ['apiKey','authDomain','projectId','storageBucket','messagingSenderId','appId'];
    let filled = 0;
    keys.forEach(k => {
      if (obj[k]) {
        const el = document.getElementById('fbcfg-' + k);
        if (el) { el.value = obj[k]; filled++; }
      }
    });
    snack(filled + ' of 6 fields filled from pasted config');
  } catch(e) {
    snack('Invalid JSON — ' + e.message, 'err');
  }
}

function clearFbConfig() {
  if (!confirm('Clear Firebase config? The page will reload.')) return;
  sessionStorage.removeItem('vtp4_fbcfg');
  location.reload();
}

function saveFbConfig() {
  const keys = ['apiKey','authDomain','projectId','storageBucket','messagingSenderId','appId'];
  const vals = {};
  for (const k of keys) {
    const v = (document.getElementById('fbcfg-' + k)?.value || '').trim();
    if (!v) { snack('All 6 fields are required', 'err'); return; }
    vals[k] = v;
  }
  sessionStorage.setItem('vtp4_fbcfg', JSON.stringify(vals));
  snack('Config saved — reconnecting…');
  setTimeout(() => location.reload(), 600);
}

// Apply saved config from sessionStorage on every load
(function applySessionConfig() {
  try {
    const saved = sessionStorage.getItem('vtp4_fbcfg');
    if (!saved) return;
    const vals = JSON.parse(saved);
    Object.assign(FIREBASE_CONFIG, vals);
  } catch(e) {}
})();

async function runFirebaseTests() {
  const el = document.getElementById('fb-test-results');
  const summary = document.getElementById('fb-test-summary');
  if (!el) return;

  const results = [];
  const log = (label, ok, detail='') => {
    results.push({label, ok, detail});
    el.innerHTML = results.map(r => `
      <div style="display:flex;align-items:flex-start;gap:10px;padding:10px 16px;border-bottom:1px solid var(--md-outline-variant)">
        <span class="mi sm" style="color:${r.ok?'var(--md-success)':'var(--md-error)'};margin-top:1px">${r.ok?'check_circle':'cancel'}</span>
        <div>
          <div style="font-size:13px;font-weight:500">${esc(r.label)}</div>
          ${r.detail?`<div style="font-size:12px;color:var(--md-on-surface-variant);margin-top:2px">${esc(r.detail)}</div>`:''}
        </div>
      </div>`).join('') + `<div style="padding:12px 16px;font-size:12px;color:var(--md-on-surface-variant)">Running…</div>`;
    const passed = results.filter(r=>r.ok).length;
    if (summary) summary.textContent = passed + '/' + results.length + ' Passed';
  };

  el.innerHTML = '<div style="padding:24px;text-align:center;font-size:13px;color:var(--md-on-surface-variant)">Running tests…</div>';

  // Test 1: Config check
  const configured = !Object.values(FIREBASE_CONFIG).some(v => v.startsWith('REPLACE'));
  log('Firebase config present', configured, configured ? 'All 6 keys are set' : 'One or more keys start with REPLACE_WITH_');
  if (!configured) { el.querySelector('div:last-child').remove(); return; }

  // Test 2: DB._online — show exact error if failed
  const initErr = DB._initError || '';
  log('Firebase connection (DB._online)', DB._online,
    DB._online
      ? 'Connected — Firestore is reachable'
      : 'Failed: ' + (initErr || 'unknown error') + '\n→ Common causes: wrong projectId, Firestore not enabled, or security rules blocking writes to _ping'
  );

  // Test 2b: even if ping failed, try a lightweight read to see if read-only works
  if (!DB._online) {
    try {
      await DB._db.collection('_ping').doc('ping').get();
      log('Firestore read-only access', true, 'Reads work — rules may be blocking writes. Allow write to _ping or change ping to a read');
    } catch(e2) {
      log('Firestore read-only access', false, e2.code + ': ' + e2.message);
    }
    el.querySelector('div:last-child') && el.querySelector('div:last-child').textContent === 'Running…' && el.querySelector('div:last-child').remove();
    return;
  }

  // Test 3: Write to _test collection
  try {
    await DB._db.collection('_test').doc('ping').set({ ts: Date.now(), by: 'firebase_test_tab' });
    log('Firestore write (_test/ping)', true, 'Document written successfully');
  } catch(e) {
    log('Firestore write (_test/ping)', false, e.message);
  }

  // Test 4: Read back
  try {
    const snap = await DB._db.collection('_test').doc('ping').get();
    const ok = snap.exists && snap.data().by === 'firebase_test_tab';
    log('Firestore read (_test/ping)', ok, ok ? 'Document read back correctly' : 'Document missing or data mismatch');
  } catch(e) {
    log('Firestore read (_test/ping)', false, e.message);
  }

  // Test 5: Read users collection
  try {
    const snap = await DB._db.collection('users').get();
    log('Firestore read (users collection)', true, snap.size + ' documents found');
  } catch(e) {
    log('Firestore read (users collection)', false, e.message + ' — check Firestore security rules');
  }

  // Test 6: Read vehicles collection
  try {
    const snap = await DB._db.collection('vehicles').get();
    log('Firestore read (vehicles collection)', true, snap.size + ' documents found');
  } catch(e) {
    log('Firestore read (vehicles collection)', false, e.message);
  }

  // Test 7: Read dpcs collection
  try {
    const snap = await DB._db.collection('dpcs').get();
    log('Firestore read (dpcs collection)', true, snap.size + ' documents found');
  } catch(e) {
    log('Firestore read (dpcs collection)', false, e.message);
  }

  // Test 8: Real-time listener
  try {
    await new Promise((resolve, reject) => {
      const timeout = setTimeout(() => reject(new Error('Listener did not fire within 5s')), 5000);
      const unsub = DB._db.collection('_test').onSnapshot(snap => {
        clearTimeout(timeout);
        unsub();
        resolve(snap.size);
      }, reject);
    });
    log('Firestore real-time listener', true, 'onSnapshot fired successfully');
  } catch(e) {
    log('Firestore real-time listener', false, e.message);
  }

  // Remove "Running..." footer
  const last = el.querySelector('div:last-child');
  if (last && last.textContent === 'Running…') last.remove();

  const passed = results.filter(r=>r.ok).length;
  const allOk = passed === results.length;
  if (summary) summary.textContent = passed + '/' + results.length + ' Passed';
  el.insertAdjacentHTML('beforeend', `
    <div style="padding:14px 16px;background:${allOk?'#e6f4ea':'#fce8e6'};display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500;color:${allOk?'#1e8e3e':'#d93025'}">
      <span class="mi sm">${allOk?'check_circle':'error'}</span>
      ${allOk ? 'All tests passed — Firebase is working correctly' : (passed + ' of ' + results.length + ' tests passed — see failures above')}
    </div>`);
}

async function previewFirestoreData() {
  const el = document.getElementById('fb-data-preview');
  if (!el) return;
  if (!DB._online) { el.innerHTML = '<p style="color:var(--md-error);font-size:13px;padding:8px">Firebase is offline — cannot load data.</p>'; return; }

  el.innerHTML = '<p style="font-size:13px;color:var(--md-on-surface-variant);padding:8px">Loading…</p>';

  const collections = ['users','vehicles','dpcs','godowns'];
  let html = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">';
  for (const col of collections) {
    try {
      const snap = await DB._db.collection(col).limit(5).get();
      const docs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      html += `<div style="background:var(--md-bg);border-radius:8px;padding:12px">
        <div style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--md-on-surface-variant);margin-bottom:8px">
          ${col} (${snap.size} docs${snap.size===5?' — showing 5':''})
        </div>`;
      if (docs.length === 0) {
        html += '<div style="font-size:12px;color:var(--md-on-surface-variant);font-style:italic">Empty collection</div>';
      } else {
        html += docs.map(d => {
          const preview = col==='users'
            ? `${d.name||'?'} · ${d.role||'?'} · ${d.active?'active':'inactive'}`
            : col==='vehicles'
            ? `${d.vehicleNumber||'?'} · ${d.dpcName||'?'}`
            : col==='dpcs'
            ? `${d.name||'?'} · ${d.location||'?'}`
            : `${d.name||'?'} · ${d.location||'?'}`;
          return `<div style="font-size:12px;padding:4px 0;border-bottom:1px solid var(--md-outline-variant);display:flex;justify-content:space-between;gap:8px">
            <span style="font-family:var(--fm);color:var(--md-primary)">${esc(d.id.slice(0,10))}</span>
            <span style="color:var(--md-on-surface-variant);text-align:right">${esc(preview)}</span>
          </div>`;
        }).join('');
      }
      html += '</div>';
    } catch(e) {
      html += `<div style="background:#fce8e6;border-radius:8px;padding:12px">
        <div style="font-size:12px;font-weight:600;color:var(--md-error);margin-bottom:4px">${col}</div>
        <div style="font-size:12px;color:var(--md-error)">${esc(e.message)}</div>
      </div>`;
    }
  }
  html += '</div>';
  el.innerHTML = html;
}

</script>
